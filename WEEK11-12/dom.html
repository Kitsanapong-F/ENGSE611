<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body {
            font-family: "Prompt", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        #header {
            color: darkblue;
        }

        .item {
            padding: 4px 0;
        }

        .highlight {
            background: yellow;
        }

        button {
            padding: 8px 16px;
            margin: 4px 4px 10px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #00bfff;
            color: white;
            font-size: 14px;
        }

        button:hover {
            background: #0095d6;
        }

        #logBox {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border-left: 4px solid #00d26a;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1 id = "header">หัวข้อเดิมหน้าเว็บ</h1>
    <p>รายการตัวอย่าง (class = "item")</p>
    <ul>
        <li class="item">รายการที่1</li>
        <li class="item">รายการที่2</li>
        <li class="item">รายการที่3</li>
    </ul>

    <div style="margin-top: 20px; margin-bottom: 10px;">
        <button onclick="changeTitle()">เปลี่ยนข้อความ</button>
         <button onclick="highlighItems()">highlighItems</button>
          <button onclick="addParagraph()">สร้าง</button>
    </div>

    <div id = "logBox">log : กดปุ่ม</div>
    <script>
        const title = document.getElementById("header");
        const items = document.querySelectorAll(".item");
        const logBox = document.getElementById("logBox");
        
        function log(message){
            console.log(message);
            logBox.textContent += "\n +" + message;
        }

        function changeTitle(){
            title.textContent = "หัวข้อเปลี่ยนด้วยjava script";
            title.style.color = "red";
            title.style.fontWeight = "bold";
            log("เปลี่ยนข้อความและสีของ#header แล้ว");
        }

        function highlighItems(){
            items.forEach((item, index) =>{
                item.classList.add("highligh");
                item.textContent = "รายการที่" + (index+1) + "ถูกไฮไลด์";
            });
            log("เพิ่มคลาส .highligh ให้ .item ทั้งหมด");
        }

        function addParagraph(){
            let p = document.createElement("p");
            p.textContent = "ข้อความใหม่ที่เพิ่มจาฟ java script เวลา :" + new Date().toLocaleTimeString();
            document.body.appendChild(p);
            log("สร้าง <p> ใหม่และ appendChild ลง ท้าย <body> ");
        }
    </script>
</body>
</html>
